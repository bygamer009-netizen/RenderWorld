<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag crucial para que se vea bien en pantallas de celulares sin hacer zoom raro -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Neon Render Studio - Móvil</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-glow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
            --bg-color: #050a12;
            --panel-bg: rgba(10, 20, 38, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            /* Evita el retraso de clic en móviles */
            touch-action: manipulation; 
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: row; /* Desktop por defecto */
            overflow: hidden;
        }

        /* Panel de Control Lateral */
        #control-panel {
            width: 320px;
            background: var(--panel-bg);
            border-right: 2px solid var(--neon-blue);
            box-shadow: 5px 0 20px rgba(0, 240, 255, 0.15);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.4rem;
            text-align: center;
            color: var(--neon-blue);
            text-shadow: var(--neon-glow);
            letter-spacing: 1px;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #8ab4f8;
            border-bottom: 1px dashed rgba(0, 240, 255, 0.3);
            padding-bottom: 3px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.8rem;
            color: #b0c4de;
        }

        /* Botones Neón optimizados para dedos en Android */
        button, .file-input-label {
            background: transparent;
            border: 1.5px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px 15px; /* Más alto para que sea fácil de pulsar */
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-shadow: 0 0 5px rgba(0,240,255,0.5);
            transition: all 0.2s ease;
            text-align: center;
            display: block;
            width: 100%;
        }

        button:active, .file-input-label:active {
            background: var(--neon-blue);
            color: #000;
            box-shadow: var(--neon-glow);
            text-shadow: none;
        }

        input[type="file"] {
            display: none;
        }

        select {
            background: #0f1c30;
            border: 1.5px solid rgba(0, 240, 255, 0.5);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            outline: none;
            width: 100%;
            font-size: 0.9rem;
        }

        /* Área del Render */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            height: 100%;
        }

        #render-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #instructions {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(5, 10, 18, 0.85);
            border: 1px solid var(--neon-blue);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.75rem;
            color: #b0c4de;
            pointer-events: none;
        }

        /* --- ADAPTACIÓN PARA ANDROID / MÓVILES (Pantallas Verticales) --- */
        @media (max-width: 768px) {
            body {
                flex-direction: column-reverse; /* El lienzo arriba, controles abajo */
            }

            #control-panel {
                width: 100%;
                height: 40vh; /* Ocupa el 40% inferior de la pantalla */
                border-right: none;
                border-top: 2px solid var(--neon-blue);
                box-shadow: 0 -5px 20px rgba(0, 240, 255, 0.15);
                padding: 15px;
            }

            #canvas-container {
                height: 60vh; /* El 60% superior para ver el render grande */
            }

            #instructions {
                top: 15px;
                bottom: auto; /* Se mueve arriba para no estorbar con el panel */
                right: 15px;
            }
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <h1>NEON RENDER</h1>
        
        <div class="control-group">
            <span class="section-title">1. Tu Skin</span>
            <label for="skin-loader" class="file-input-label">Cargar Skin desde Galería</label>
            <input type="file" id="skin-loader" accept="image/png">
        </div>

        <div class="control-group">
            <span class="section-title">2. Ítem de Minecraft</span>
            <select id="item-select">
                <option value="none">Sin Objeto</option>
                <option value="sword">Espada Neón</option>
                <option value="pickaxe">Pico Neón</option>
            </select>
        </div>

        <div class="control-group">
            <span class="section-title">3. Iluminación</span>
            <button id="toggle-shadows">Sombras: ON</button>
            <button id="trigger-bloom">Efecto Destello</button>
        </div>

        <div class="control-group">
            <span class="section-title">4. Descargar</span>
            <select id="resolution-select">
                <option value="64">Calidad Estándar (64x)</option>
                <option value="128">Calidad HD (128x)</option>
                <option value="32">Calidad Mini (32x)</option>
            </select>
            <button id="export-btn" style="margin-top: 8px;">GUARDAR EN CELULAR</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="render-canvas"></canvas>
        <div id="instructions">Arrastra para rotar el personaje</div>
    </div>

    <script>
        // --- MOTOR GRÁFICO ---
        const canvas = document.getElementById('render-canvas');
        const container = document.getElementById('canvas-container');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050a12);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.set(0, 1.3, 4.0); // Ajustado para verse mejor en pantallas de celular

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimizado para que no vaya lento en celulares gama media/baja
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // --- LUCES ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0x00f0ff, 1.2);
        dirLight.position.set(2, 4, 3);
        dirLight.castShadow = true;
        // Mapas de sombra más pequeños para que Android los procese fluidamente
        dirLight.shadow.mapSize.width = 512; 
        dirLight.shadow.mapSize.height = 512;
        scene.add(dirLight);

        const rimLight = new THREE.PointLight(0xffffff, 0.8, 8);
        rimLight.position.set(-2, 2, -2);
        scene.add(rimLight);

        // Suelo receptor de sombras
        const floorGeo = new THREE.PlaneGeometry(10, 10);
        const floorMat = new THREE.ShadowMaterial({ opacity: 0.4 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1.2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- MODELO DEL PERSONAJE ---
        const charGroup = new THREE.Group();
        scene.add(charGroup);

        const defaultTexture = createDefaultSteveTexture();
        const charMaterial = new THREE.MeshStandardMaterial({ map: defaultTexture, roughness: 0.8, metalness: 0.1 });

        const headGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const bodyGeo = new THREE.BoxGeometry(0.8, 1.2, 0.4);
        const limbGeo = new THREE.BoxGeometry(0.4, 1.2, 0.4);

        const head = new THREE.Mesh(headGeo, charMaterial); head.position.y = 1.0; head.castShadow = true; charGroup.add(head);
        const body = new THREE.Mesh(bodyGeo, charMaterial); body.position.y = 0.0; body.castShadow = true; body.receiveShadow = true; charGroup.add(body);
        const leftArm = new THREE.Mesh(limbGeo, charMaterial); leftArm.position.set(-0.6, 0.0, 0); leftArm.castShadow = true; charGroup.add(leftArm);
        const rightArm = new THREE.Mesh(limbGeo, charMaterial); rightArm.position.set(0.6, 0.0, 0); rightArm.castShadow = true; charGroup.add(rightArm);
        const leftLeg = new THREE.Mesh(limbGeo, charMaterial); leftLeg.position.set(-0.2, -1.2, 0); leftLeg.castShadow = true; charGroup.add(leftLeg);
        const rightLeg = new THREE.Mesh(limbGeo, charMaterial); rightLeg.position.set(0.2, -1.2, 0); rightLeg.castShadow = true; charGroup.add(rightLeg);

        // --- ACCESORIOS (ESTILO MINECRAFT COHERENTE) ---
        const itemGroup = new THREE.Group();
        rightArm.add(itemGroup);
        itemGroup.position.set(0, -0.5, 0.2);

        function buildPixelatedItem(type) {
            while(itemGroup.children.length > 0) { itemGroup.remove(itemGroup.children[0]); }
            if (type === 'none') return;

            const itemGeo = new THREE.BoxGeometry(0.12, 1.0, 0.12);
            const itemMat = new THREE.MeshStandardMaterial({
                color: 0x00f0ff,
                emissive: 0x00f0ff,
                emissiveIntensity: 0.6,
                roughness: 0.2
            });
            const itemMesh = new THREE.Mesh(itemGeo, itemMat);
            itemMesh.rotation.z = Math.PI / 4;
            itemMesh.castShadow = true;
            itemGroup.add(itemMesh);
        }

        // --- CONTROLES INTELIGENTES: MOUSE + TÁCTIL (ANDROID) ---
        let isDragging = false;
        let previousPosition = { x: 0, y: 0 };

        // Eventos de Mouse (PC)
        canvas.addEventListener('mousedown', (e) => { isDragging = true; previousPosition = { x: e.clientX, y: e.clientY }; });
        canvas.addEventListener('mousemove', (e) => { handleMove(e.clientX, e.clientY); });
        window.addEventListener('mouseup', () => { isDragging = false; });

        // Eventos Táctiles (Android)
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            const touch = e.touches[0];
            previousPosition = { x: touch.clientX, y: touch.clientY };
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            handleMove(touch.clientX, touch.clientY);
        }, { passive: true });

        window.addEventListener('touchend', () => { isDragging = false; });

        function handleMove(currentX, currentY) {
            if (!isDragging) return;
            const deltaX = currentX - previousPosition.x;
            const deltaY = currentY - previousPosition.y;

            charGroup.rotation.y += deltaX * 0.008;
            charGroup.rotation.x += deltaY * 0.008;

            previousPosition = { x: currentX, y: currentY };
        }

        // --- LÓGICA DE INTERFAZ DE USUARIO ---

        // Cargar archivo en Android (abre el selector de archivos nativo o galería)
        document.getElementById('skin-loader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const texture = new THREE.Texture(img);
                        texture.magFilter = THREE.NearestFilter; // Evita que se vea borroso
                        texture.minFilter = THREE.NearestFilter;
                        texture.needsUpdate = true;
                        charMaterial.map = texture;
                        charMaterial.needsUpdate = true;
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('item-select').addEventListener('change', (e) => {
            buildPixelatedItem(e.target.value);
        });

        // Sombras
        let shadowsEnabled = true;
        document.getElementById('toggle-shadows').addEventListener('click', (e) => {
            shadowsEnabled = !shadowsEnabled;
            renderer.shadowMap.enabled = shadowsEnabled;
            dirLight.castShadow = shadowsEnabled;
            e.target.innerText = `Sombras: ${shadowsEnabled ? 'ON' : 'OFF'}`;
            scene.traverse((node) => { if (node.material) node.material.needsUpdate = true; });
        });

        // Bloom suave (destello)
        document.getElementById('trigger-bloom').addEventListener('click', () => {
            let intensity = 1.2;
            const interval = setInterval(() => {
                intensity += 0.2;
                dirLight.intensity = intensity;
                if (intensity >= 2.6) {
                    clearInterval(interval);
                    const fade = setInterval(() => {
                        intensity -= 0.15;
                        dirLight.intensity = intensity;
                        if (intensity <= 1.2) { dirLight.intensity = 1.2; clearInterval(fade); }
                    }, 30);
                }
            }, 20);
        });

        // Guardar foto en Android
        document.getElementById('export-btn').addEventListener('click', () => {
            const size = parseInt(document.getElementById('resolution-select').value);
            const originalWidth = container.clientWidth;
            const originalHeight = container.clientHeight;

            // Renderiza en la proporción exacta elegida de forma limpia
            renderer.setSize(size, (size * originalHeight) / originalWidth);
            renderer.render(scene, camera);

            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `render_${size}x.png`;
            link.href = dataURL;
            link.click();

            // Reestablecer para no alterar la fluidez de la pantalla
            renderer.setSize(originalWidth, originalHeight);
        });

        // Render Loop & Resize
        function animate() {
            requestAnimationFrame(animate);
            if (!isDragging) {
                charGroup.rotation.y += 0.003; // Rotación lenta automática
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        function createDefaultSteveTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#5c4033'; ctx.fillRect(0, 0, 64, 64);
            ctx.fillStyle = '#2e8b57'; ctx.fillRect(0, 0, 64, 20);
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        animate();
    </script>
</body>
</html>
